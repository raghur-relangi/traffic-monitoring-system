    {% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Traffic Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">📊 Traffic Dashboard</span>
    </div>
</nav>

<div class="container mt-5">

    <div class="row">

        <!-- VEHICLE COUNT -->
        <div class="col-md-6 mb-3">
            <div class="dashboard-box vehicle-box">
                <h4>🚗 Vehicle Count</h4>
                <h2 id="vehicleCount">
                    {{ count|default:0 }}
                </h2>
            </div>
        </div>

        <!-- ANOMALY STATUS -->
        <div class="col-md-6 mb-3">
            <div class="dashboard-box anomaly-box">
                <h4>⚠️ Anomaly Status</h4>

                {% if anomaly %}
                    <h2 id="anomalyText">Detected</h2>
                {% else %}
                    <h2 id="anomalyText">Normal</h2>
                {% endif %}

            </div>
        </div>

    </div>

    <!-- CHART -->
    <div class="card mt-4 p-4">
        <h4>Traffic Analysis</h4>
        <canvas id="trafficChart"></canvas>
    </div>

    <!-- BACK BUTTON -->
    <div class="text-center mt-4">
        <a href="{% url 'index' %}" class="btn btn-secondary">
            🔙 Upload Another Video
        </a>
    </div>

</div>

<!-- JS -->
<script src="{% static 'js/script.js' %}"></script>

<!-- SAFE SCRIPT (NO ERRORS) -->
<script>
    document.addEventListener("DOMContentLoaded", function () {

        // Get values safely
        const count = parseInt("{{ count|default:0 }}");
        const anomaly = "{{ anomaly|default:'False' }}";

        // ===== ALERT =====
        if (anomaly === "True") {
            alert("⚠️ Anomaly Detected in Traffic!");
        }

        // ===== CHART =====
        const ctx = document.getElementById('trafficChart');

        if (ctx) {
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Vehicles'],
                    datasets: [{
                        label: 'Vehicle Count',
                        data: [count]
                    }]
                }
            });
        }

        // ===== AUTO REFRESH (OPTIONAL) =====
        setTimeout(() => {
            location.reload();
        }, 15000); // 15 seconds

    });
</script>

</body>
</html>
